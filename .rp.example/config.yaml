# Example .rp/config.yaml
#
# Copy this to your project's `.rp/config.yaml` to customize the container
# image. Both `image:` and `build:` are optional; an empty/missing file means
# "use the default robo-pen-default image" (Node 22 + Python+uv + R + DuckDB +
# Claude CLI). See docs/adr/0006-per-project-images-with-rp-overlay.md for
# the full design.
#
# Pick ONE of `image:` or `build:`. Setting both is a config error.

# ── Agent profile ──────────────────────────────────────────────────
# Which coding agent the container runs. Defaults to claude-code. Looked up
# in <repo>/agent.profiles/<name>/ first, then in this workspace's
# .rp/agents/<name>/. Drop a manifest.yaml in .rp/agents/<name>/ to override
# or define a new agent without patching rp.
#
# agent: claude-code
# agent: opencode

# ── Option 1: pull a pre-built image ───────────────────────────────
# image: python:3.12-slim-bookworm
# image: ghcr.io/your-org/devtools:v1.4

# ── Option 2: build locally from a Dockerfile ─────────────────────
# `context` defaults to `.` (= the .rp/ directory), so by default
# only files inside .rp/ are available to COPY. Set `context: ..` to
# use the workspace root as build context.
#
# build:
#   context: .                    # relative to .rp/
#   dockerfile: Dockerfile        # relative to context
#   args:
#     NODE_VERSION: "22"

# ── Option 3: shortcut ─────────────────────────────────────────────
# If you only need to build a custom Dockerfile, drop it at .rp/Dockerfile
# and skip this config file entirely. rp will detect it automatically.

# ── Container user ─────────────────────────────────────────────────
# Defaults to `coder` (uid 1000, created by the rp overlay if missing).
# Set to adopt a user that the base image already established (e.g. node:22
# uses `node`, python images often use `app`). The overlay verifies the user
# exists, has uid != 0, and is not in any sudoers file — build fails if any
# check fails.
#
# user: node

# ── strip_sudo (advanced) ──────────────────────────────────────────
# Default false: rp refuses to use a user with any sudoers grant (the
# shadow boundary in ADR-0005 requires the user to have no path to root).
# Set strip_sudo: true to opt in to rp REMOVING the user's sudo grant
# during the overlay build instead of refusing. Useful for devcontainer
# images that ship their default user (e.g. `node`) with passwordless
# sudo. The build still runs the post-strip sudoers grep, so a missed
# grant path still fails the build — strip_sudo is best-effort, not a
# trust-me override. See docs/adr/0009-opt-in-sudo-stripping.md.
#
# image: mcr.microsoft.com/devcontainers/javascript-node:22
# user: node
# strip_sudo: true

# ── Container resources ────────────────────────────────────────────
# Forwarded to `container create` as --memory / --cpus. Missing keys =
# Apple Container's default of 1G per container — too low for `npm install`
# on typical node projects (gets OOM-killed without warning). Uncomment
# and raise if `rp run`/`npm install` dies silently; confirm with
# `rp stats` or `cat /sys/fs/cgroup/memory.events` (oom_kill > 0).
# memory accepts the same size strings Apple Container does: integer +
# optional K/M/G/T suffix (e.g. 512M, 4G, 16g, 2048K). cpus must be a
# positive integer.
#
# resources:
#   memory: 8G
#   cpus: 4

# ── rp-fuse runtime tuning ────────────────────────────────────────
# Cache TTL for the FUSE attr/entry/negative cache, in seconds. Default 1.0.
# Lower values pick up host-side edits faster but increase FUSE syscall
# overhead. Raising it speeds large dir walks (e.g. claude indexing) at the
# cost of slightly stale views.
#
# fuse:
#   cache: 1.0

# ── Plugins (claude-code only, today) ──────────────────────────────
# Extends the agent profile's plugin set. Both lists are appended to
# whatever the profile already declared. Marketplaces must be registered
# before plugins from them can be installed — `claude plugin install`
# uses `<plugin-name>@<marketplace-name>` so the marketplace name has
# to match. See ADR-0016 for the build-time install model + why these
# run at image build, not on every `rp create`.
#
# Changes take effect on the next `rp destroy && rp create` (rebuilds
# the image with new plugins compiled in). Workspace plugin volumes
# survive `rp destroy`; new plugins are merged in via the init-time
# seed copy. Removing a plugin from this list does NOT remove it from
# already-seeded volumes — use `rp purge` for a clean slate.
#
# IMPORTANT: the marketplace NAME in the install entry is the name the
# marketplace declares for itself (in its marketplace.json), NOT the
# github repo path. For jarrodwatts/claude-hud the marketplace declares
# itself as `claude-hud`, so the install ref is `claude-hud@claude-hud`,
# not `claude-hud@jarrodwatts-claude-hud`. Find the right name by
# running `claude plugin marketplace list` after `add` (or read the
# repo's marketplace.json).
#
# plugins:
#   marketplaces:
#     - jarrodwatts/claude-hud         # github user/repo short form
#     # - https://example.com/my-marketplace.git
#   install:
#     - claude-hud@claude-hud          # <plugin-name>@<marketplace-self-name>

# ── Host aliases ──────────────────────────────────────────────────
# Inject /etc/hosts entries inside the container so processes can resolve
# well-known names. `host.containers.internal` → the host's gateway IP
# is ALWAYS injected automatically (matches the convention used by
# Podman / Docker / ai-pod); you don't need to list it here. Anything
# you add is appended.
#
# Each entry is either:
#   - "name"                        → IP = host-gateway (the host itself)
#   - { name: NAME, ip: IP }        → IP = a fixed IPv4 (e.g. a host LAN
#                                     service the container should reach)
#
# host_aliases:
#   - mac.local                       # additional alias for the host
#   - name: postgres.dev
#     ip: 192.168.64.10               # a service on the host LAN

# ── Constraints (v1) ───────────────────────────────────────────────
# - Base image must be Debian/Ubuntu-derived. rp probes for /etc/debian_version
#   before building the overlay; Alpine, RHEL, Arch, distroless bases are
#   rejected with a clear error. Good picks: debian:bookworm-slim, ubuntu:24.04,
#   node:*-bookworm, python:*-slim-bookworm.
# - Only the keys above are honored. Anything else (services, depends_on,
#   ports, environment, volumes, ...) raises a parse error with a line
#   number. Run `rp lint` inside your workspace to validate this file.
